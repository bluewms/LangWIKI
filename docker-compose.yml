version: '3.9'

services:
  langwiki:
    build: .
    container_name: langwiki
    ports:
      - "3100:3100"
    environment:
      - PORT=3100
      - NODE_ENV=production
      - LANGWIKI_DATA_DIR=/app/data
      - LANGWIKI_USERS_DIR=/app/data/users
      # LLM 配置（按需选择一个模型并设置对应 API Key）
      - LLM_MODEL=${LLM_MODEL:-deepseek/deepseek-chat}
      - LLM_TEMPERATURE=${LLM_TEMPERATURE:-0.3}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - business-data:/data/business
      - langwiki-system:/app/data

volumes:
  business-data:
  langwiki-system:
