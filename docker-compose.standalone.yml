services:
  langwiki:
    build: .
    container_name: langwiki-standalone
    ports:
      - "3100:3100"
    environment:
      - PORT=3100
      - NODE_ENV=production
      - LANGWIKI_DATA_DIR=/app/data
      - LANGWIKI_USERS_DIR=/app/data/users
      - LANGWIKI_FRONTEND_DIST=/app/frontend/dist
    volumes:
      - ./data/business:/data/business
      - ./data/system:/app/data
    restart: unless-stopped
